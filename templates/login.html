{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VidhikPath</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your VidhikPath account</p>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <!-- Firebase Login Form -->
            <div class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="button" class="btn btn-primary btn-full" onclick="firebaseLogin()">
                    Sign In
                </button>
                <button type="button" class="btn btn-link" onclick="showPasswordReset()">
                    Forgot Password?
                </button>
            </div>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="/register/">Register here</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase Password Reset Modal -->
    <div id="passwordResetModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Reset Password</h3>
            <div class="form-group">
                <label for="resetEmail">Email Address</label>
                <input type="email" id="resetEmail" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-primary" onclick="sendPasswordReset()">Send Reset Email</button>
                <button type="button" class="btn btn-secondary" onclick="hidePasswordReset()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <!-- External JS -->
    <script src="{% static 'js/login.js' %}"></script>
</body>
</html>
