{% extends 'base.html' %}
{% load static %}

{% block title %}Login - VidhikPath{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your VidhikPath account</p>
        </div>
        
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        
        <div class="auth-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="button" class="btn btn-primary btn-full" onclick="firebaseLogin()">
                Sign In
            </button>
            <button type="button" class="btn btn-link" onclick="showPasswordReset()">
                Forgot Password?
            </button>
        </div>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="/register/">Register here</a></p>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="{% static 'js/login.js' %}"></script>
{% endblock %}
