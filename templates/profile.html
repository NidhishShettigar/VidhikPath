{% extends 'dashboard.html' %}
{% load static %}


{% block extra_css %}{{ block.super }}<link rel="stylesheet" href="{% static 'css/profile.css' %}">{% endblock %}
{% block extra %}

<!-- Profile Modal -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Profile Settings</h3>
            <button class="close-btn" onclick="closeProfile()">&times;</button>
        </div>
        
        <div class="modal-body">
            <div class="profile-section">
                <div class="profile-photo-section">
                    {% if user.userprofile.profile_photo %}
                        <img src="{{ user.userprofile.profile_photo.url }}" alt="Profile" class="profile-photo">
                    {% else %}
                        <div class="profile-photo-placeholder">{{ user.first_name.0|upper }}</div>
                    {% endif %}
                    <button class="btn btn-sm btn-secondary">Change Photo</button>
                </div>
                
                <div class="profile-info">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" value="{{ user.first_name }}" id="profileName">
                    </div>
                    
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" value="{{ user.username }}" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" value="{{ user.email }}" readonly>
                    </div>
                </div>
            </div>
            
            <div class="settings-section">
                <h4>Settings</h4>
                
                <div class="setting-item">
                    <label>Theme Mode</label>
                    <div class="theme-toggle">
                        <button class="theme-btn active" onclick="setTheme('light')">☀️ Light</button>
                        <button class="theme-btn" onclick="setTheme('dark')">🌙 Dark</button>
                    </div>
                </div>
            </div>
            
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}
