{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - VidhikPath</title>
    <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join VidhikPath community</p>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="successMessage" class="success-message" style="display: none;"></div>
            
            <!-- Registration Form -->
            <div class="auth-form">
                <!-- Basic Info -->
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" required>
                    <small class="password-hint">Must contain at least 6 characters</small>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+91 9876543210">
                </div>
                
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" placeholder="City, State">
                </div>
                
                <!-- Account Type -->
                <div class="form-group">
                    <label>Account Type *</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="userType" value="user" checked onchange="toggleLawyerFields()">
                            <span>User</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="userType" value="lawyer" onchange="toggleLawyerFields()">
                            <span>Lawyer</span>
                        </label>
                    </div>
                </div>
                
                <!-- Lawyer-specific fields -->
                <div id="lawyerFields" style="display: none;">
                    <h3 class="section-title">Professional Information</h3>
                    
                    <div class="form-group">
                        <label for="lawyerType">Practice Area *</label>
                        <select id="lawyerType" required>
                            <option value="">Select Practice Area</option>
                            <option value="Criminal Law">Criminal Law</option>
                            <option value="Civil Law">Civil Law</option>
                            <option value="Family Law">Family Law</option>
                            <option value="Corporate Law">Corporate Law</option>
                            <option value="Property Law">Property Law</option>
                            <option value="Labor Law">Labor Law</option>
                            <option value="Tax Law">Tax Law</option>
                            <option value="Constitutional Law">Constitutional Law</option>
                            <option value="Immigration Law">Immigration Law</option>
                            <option value="Environmental Law">Environmental Law</option>
                            <option value="Intellectual Property">Intellectual Property</option>
                            <option value="Banking Law">Banking Law</option>
                            <option value="Insurance Law">Insurance Law</option>
                            <option value="Consumer Protection">Consumer Protection</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="experience">Years of Experience *</label>
                        <input type="number" id="experience" min="0" max="60" required>
                    </div>
                
                    <div class="form-group">
                        <label for="licenseNumber">License Number *</label>
                        <input type="text" id="licenseNumber" placeholder="Your Bar Council License Number" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="education">Education Qualification *</label>
                        <input type="text" id="education" placeholder="e.g., LLB from XYZ University" required>
                    </div>

                    <div class="form-group">
                        <label for="languagesSpoken">Languages Spoken</label>
                        <input type="text" id="languagesSpoken" placeholder="e.g., English, Hindi (comma-separated)">
                    </div>
                    
                    <div class="form-group">
                        <label for="licenseDocument">License Document</label>
                        <input type="file" id="licenseDocument" accept=".pdf,.jpg,.jpeg,.png">
                    </div>
                </div>
                
                <!-- Terms -->
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="agreeTerms" required>
                        <span>I agree to the <a href="/terms/" target="_blank">Terms</a> and <a href="/privacy/" target="_blank">Privacy Policy</a> *</span>
                    </label>
                </div>
                
                <button type="button" class="btn btn-primary btn-full" onclick="firebaseRegister()">
                    Create Account
                </button>
            </div>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="/login/">Sign in here</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <!-- External JS -->
    <script src="/static/js/register.js"></script>
</body>
</html>
