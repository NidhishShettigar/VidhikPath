{% extends 'dashboard.html' %}
{% load static %}

{% block extra_css %}{{ block.super }}<link rel="stylesheet" href="{% static 'css/chatbot.css' %}">{% endblock %}
{% block extra %}

        <div class="feature-content active" id="chatbotContent">
            <div class="chatbot-container">
                <div class="chat-header">
                    <h3>VidhikAI - Legal Assistant</h3>
                    <div class="language-selector">
                        <select id="languageSelect">
                            <option value="english">English</option>
                            <option value="hindi">हिंदी</option>
                            <option value="kannada">ಕನ್ನಡ</option>
                        </select>
                    </div>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot-message">
                        <p>Hello! I'm VidhikAI, your legal assistant. How can I help you with legal matters today?</p>
                    </div>
                </div>
                
                <div class="chat-input-container">
                    <div class="input-group">
                        <input type="text" id="chatInput" placeholder="Ask your legal question...">
                        <button class="voice-btn" id="voiceBtn">🎙️</button>
                        <button class="send-btn" id="sendBtn">Send</button>
                    </div>
                </div>
            </div>
        </div>
{% endblock %}
